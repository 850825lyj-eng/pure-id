<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>修修图·隐私百宝箱 | 图片隐私打码工具</title>
  <meta name="description" content="修修图·隐私百宝箱，快速给图片中的敏感信息打码。马赛克、模糊、纯色块，本地处理零上传。">
  <style>
    :root {
      --bg-main: #0F172A;
      --bg-card: #1E293B;
      --color-primary: #06B6D4;
      --color-primary-hover: #0891B2;
      --color-text: #F8FAFC;
      --color-text-secondary: #94A3B8;
      --color-text-muted: #64748B;
      --border-light: rgba(6, 182, 212, 0.12);
      --border-active: rgba(6, 182, 212, 0.5);
      --shadow-xs: 0 1px 3px rgba(0,0,0,0.3);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.4);
      --radius: 12px;
      --radius-sm: 8px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --surface: #1E293B;
      --surface-hover: #233044;
    }
    body.light {
      --bg-main: #F8FAFC;
      --bg-card: #FFFFFF;
      --color-primary: #0891B2;
      --color-primary-hover: #06B6D4;
      --color-text: #0F172A;
      --color-text-secondary: #475569;
      --color-text-muted: #64748B;
      --border-light: rgba(0,0,0,0.08);
      --border-active: rgba(8,145,178,0.5);
      --surface: #FFFFFF;
      --surface-hover: #F1F5F9;
      --shadow-xs: 0 1px 3px rgba(0,0,0,0.05);
      --shadow-sm: 0 4px 12px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: var(--bg-main); color: var(--color-text); line-height: 1.6;
      -webkit-font-smoothing: antialiased; padding: 0 16px 40px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 24px 0; }
    .navbar {
      display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 16px;
      padding: 16px 20px; margin-bottom: 32px;
      background: var(--bg-card); backdrop-filter: blur(8px);
      border: 1px solid var(--border-light); border-radius: var(--radius);
      position: sticky; top: 16px; z-index: 20;
    }
    .brand { display: flex; align-items: center; gap: 12px; font-size: 1.4rem; font-weight: 700; letter-spacing: -0.3px; color: var(--color-text); }
    .brand-icon { display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
    .brand-icon svg { width: 100%; height: 100%; }
    .theme-toggle {
      display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 30px;
      border: 1px solid var(--border-light); background: transparent; cursor: pointer;
      font-size: 0.85rem; font-weight: 600; color: var(--color-text-secondary); transition: all var(--transition);
    }
    .theme-toggle:hover { border-color: var(--color-primary); color: var(--color-primary); background: rgba(6,182,212,0.1); }
    .hero { text-align: center; margin-bottom: 32px; }
    .hero h1 { font-size: 2.2rem; font-weight: 700; letter-spacing: -0.5px; color: var(--color-text); margin-bottom: 8px; }
    .hero p { font-size: 1rem; color: var(--color-text-secondary); max-width: 600px; margin: 0 auto; }

    .workbench { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 768px) { .workbench { grid-template-columns: 1fr; } }
    .panel {
      background: var(--bg-card); border-radius: var(--radius); padding: 20px;
      border: 1px solid var(--border-light); box-shadow: var(--shadow-xs);
      display: flex; flex-direction: column; gap: 16px;
    }
    .panel h3 { font-size: 1rem; font-weight: 700; color: var(--color-text); }
    .upload-zone {
      border: 2px dashed var(--border-light); border-radius: var(--radius); padding: 48px 16px;
      text-align: center; cursor: pointer; transition: background var(--transition), border-color var(--transition);
      background: rgba(255,255,255,0.02); outline: none;
    }
    .upload-zone:hover, .upload-zone.drag-over { background: rgba(6,182,212,0.05); border-color: var(--color-primary); }
    .tool-row {
      display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
      padding: 10px; border: 1px solid var(--border-light); border-radius: var(--radius-sm);
    }
    .tool-row label { font-size: 0.8rem; color: var(--color-text-secondary); white-space: nowrap; }
    .tool-row input[type="range"] { flex: 1; accent-color: var(--color-primary); }
    .canvas-wrapper {
      position: relative; border: 1px solid var(--border-light); border-radius: var(--radius-sm);
      overflow: hidden; cursor: crosshair; background: #fff;
    }
    .canvas-wrapper canvas { display: block; width: 100%; height: auto; }
    .result-preview { margin-top: 8px; }
    .result-preview img { width: 100%; border-radius: var(--radius-sm); border: 1px solid var(--border-light); }

    .btn {
      padding: 10px 24px; border-radius: 30px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
      transition: all var(--transition); background: transparent; border: 1.5px solid var(--color-primary);
      color: var(--color-primary); display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
    }
    .btn:hover { background: var(--color-primary); color: #0F172A; }
    .btn-ghost {
      padding: 8px 16px; border-radius: 30px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
      background: transparent; border: 1px solid var(--border-light); color: var(--color-text-secondary); transition: all var(--transition);
    }
    .btn-ghost:hover { border-color: var(--color-primary); color: var(--color-primary); background: rgba(6,182,212,0.1); }
    .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .small-text { font-size: 0.8rem; color: var(--color-text-muted); }
    .footer { text-align: center; margin-top: 48px; padding: 24px 0; border-top: 1px solid var(--border-light); color: var(--color-text-muted); font-size: 0.85rem; }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--color-primary); color: #0F172A; font-weight: 600;
      padding: 12px 24px; border-radius: 30px; z-index: 2000; opacity: 0; transition: opacity 0.3s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
<div class="container">
  <nav class="navbar">
    <div class="brand">
      <div class="brand-icon">
        <svg viewBox="0 0 36 36" fill="none"><rect x="2" y="8" width="32" height="20" rx="4" stroke="#06B6D4" stroke-width="2"/><rect x="6" y="12" width="8" height="8" rx="2" stroke="#06B6D4" stroke-width="2"/><rect x="22" y="12" width="8" height="8" rx="2" stroke="#06B6D4" stroke-width="2"/><line x1="14" y1="16" x2="22" y2="16" stroke="#06B6D4" stroke-width="2"/><rect x="12" y="6" width="12" height="4" rx="1" stroke="#06B6D4" stroke-width="1.5" fill="none"/><circle cx="10" cy="16" r="1.5" fill="#06B6D4"/><circle cx="26" cy="16" r="1.5" fill="#06B6D4"/></svg>
      </div>
      <span>修修图<span style="color:var(--color-primary);">·隐私百宝箱</span></span>
    </div>
    <button class="theme-toggle" id="themeToggle">🌙 深色模式</button>
  </nav>

  <div class="hero">
    <h1>隐私百宝箱</h1>
    <p>上传图片，涂抹打码。马赛克、模糊、纯色块，支持拖拽上传，所有处理均在本地完成，不上传任何数据。</p>
  </div>

  <div class="workbench">
    <div class="panel">
      <h3>📤 上传图片</h3>
      <div class="upload-zone" id="uploadZone" tabindex="0">
        <p>点击或拖拽图片到此处</p>
        <p class="small-text">支持 JPG/PNG/WebP，可多选但仅处理第一张</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" hidden>

      <h3 style="margin-top:8px;">🔒 打码工具</h3>
      <div class="tool-row">
        <label>画笔大小：</label>
        <input type="range" id="brushSize" min="5" max="80" value="25">
        <span id="brushSizeDisplay" style="font-size:0.8rem; color:var(--color-text-secondary);">25px</span>
        <button class="btn-ghost" id="mosaicBtn" onclick="setMode('mosaic')" style="border-color:var(--color-primary);">🧩 马赛克</button>
        <button class="btn-ghost" id="blurBtn" onclick="setMode('blur')">🌫️ 模糊</button>
        <button class="btn-ghost" id="solidBtn" onclick="setMode('solid')">⬛ 纯色块</button>
      </div>
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="editCanvas"></canvas>
      </div>
      <div class="btn-group">
        <button class="btn" onclick="downloadResult()">⬇️ 下载打码图</button>
        <button class="btn-ghost" onclick="resetImage()">↩️ 撤销所有打码</button>
      </div>
    </div>

    <div class="panel">
      <h3>📋 打码预览</h3>
      <div class="result-preview" id="resultPreview">
        <p style="text-align:center; color:var(--color-text-muted); padding:40px;">上传图片后此处显示预览</p>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>© 2025 修修图 Xiuxiutu · 所有处理在浏览器本地完成，零上传。</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  (function() {
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;
    const savedTheme = localStorage.getItem('theme') || 'dark';
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    const initialDark = savedTheme === 'dark' || (!savedTheme && prefersDark);
    const updateButton = () => {
      themeToggle.innerHTML = body.classList.contains('dark') ? '☀️ 浅色模式' : '🌙 深色模式';
    };
    body.classList.remove('dark', 'light');
    body.classList.add(initialDark ? 'dark' : 'light');
    updateButton();
    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('dark')) {
        body.classList.replace('dark', 'light');
        localStorage.setItem('theme', 'light');
      } else {
        body.classList.replace('light', 'dark');
        localStorage.setItem('theme', 'dark');
      }
      updateButton();
    });
  })();

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  let mode = 'mosaic';
  let brushSize = 25;
  let isDrawing = false;
  let originalImage = null;
  const canvas = document.getElementById('editCanvas');
  const ctx = canvas.getContext('2d');

  document.getElementById('brushSize').addEventListener('input', function() {
    brushSize = parseInt(this.value);
    document.getElementById('brushSizeDisplay').textContent = brushSize + 'px';
  });

  function setMode(m) {
    mode = m;
    document.getElementById('mosaicBtn').style.borderColor = m === 'mosaic' ? 'var(--color-primary)' : 'var(--border-light)';
    document.getElementById('blurBtn').style.borderColor = m === 'blur' ? 'var(--color-primary)' : 'var(--border-light)';
    document.getElementById('solidBtn').style.borderColor = m === 'solid' ? 'var(--color-primary)' : 'var(--border-light)';
  }

  const fileInput = document.getElementById('fileInput');
  const uploadZone = document.getElementById('uploadZone');

  uploadZone.addEventListener('click', () => fileInput.click());

  fileInput.addEventListener('change', (e) => {
    if (e.target.files && e.target.files.length > 0) {
      loadImage(e.target.files[0]);
      if (e.target.files.length > 1) showToast('已选择多张图片，仅处理第一张');
    }
    fileInput.value = '';
  });

  uploadZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    e.stopPropagation();
    this.classList.add('drag-over');
  });
  uploadZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    e.stopPropagation();
    this.classList.remove('drag-over');
  });
  uploadZone.addEventListener('drop', function(e) {
    e.preventDefault();
    e.stopPropagation();
    this.classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files && files.length > 0) {
      for (let i = 0; i < files.length; i++) {
        if (files[i].type.startsWith('image/')) {
          loadImage(files[i]);
          if (files.length > 1) showToast('已拖入多张图片，仅处理第一张');
          return;
        }
      }
      showToast('请拖入图片文件');
    }
  });

  function loadImage(file) {
    if (!file.type.startsWith('image/')) { showToast('请选择图片文件'); return; }
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        originalImage = img;
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        updatePreview();
        showToast('图片已加载，开始涂抹打码吧');
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  }

  function updatePreview() {
    const url = canvas.toDataURL('image/png');
    document.getElementById('resultPreview').innerHTML = `<img src="${url}" alt="打码预览">`;
  }

  canvas.addEventListener('mousedown', (e) => { isDrawing = true; draw(e); });
  canvas.addEventListener('mousemove', (e) => { if (isDrawing) draw(e); });
  canvas.addEventListener('mouseup', () => { isDrawing = false; updatePreview(); });
  canvas.addEventListener('mouseleave', () => { if (isDrawing) { isDrawing = false; updatePreview(); } });
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isDrawing = true; draw(e.touches[0]); });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (isDrawing) draw(e.touches[0]); });
  canvas.addEventListener('touchend', () => { isDrawing = false; updatePreview(); });

  function draw(e) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top) * scaleY;
    const r = brushSize;

    if (mode === 'mosaic') {
      const imageData = ctx.getImageData(x - r, y - r, r * 2, r * 2);
      const data = imageData.data;
      const blockSize = Math.max(4, Math.floor(r / 3));
      for (let by = 0; by < r * 2; by += blockSize) {
        for (let bx = 0; bx < r * 2; bx += blockSize) {
          let sumR = 0, sumG = 0, sumB = 0, count = 0;
          for (let dy = 0; dy < blockSize; dy++) {
            for (let dx = 0; dx < blockSize; dx++) {
              const idx = ((by + dy) * (r * 2) + (bx + dx)) * 4;
              if (idx < data.length) { sumR += data[idx]; sumG += data[idx + 1]; sumB += data[idx + 2]; count++; }
            }
          }
          const avgR = sumR / count, avgG = sumG / count, avgB = sumB / count;
          for (let dy = 0; dy < blockSize; dy++) {
            for (let dx = 0; dx < blockSize; dx++) {
              const idx = ((by + dy) * (r * 2) + (bx + dx)) * 4;
              if (idx < data.length) { data[idx] = avgR; data[idx + 1] = avgG; data[idx + 2] = avgB; }
            }
          }
        }
      }
      ctx.putImageData(imageData, x - r, y - r);
    } else if (mode === 'blur') {
      ctx.save();
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.clip();
      ctx.filter = 'blur(8px)';
      ctx.drawImage(canvas, 0, 0);
      ctx.filter = 'none';
      ctx.restore();
    } else if (mode === 'solid') {
      ctx.fillStyle = '#333333';
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function resetImage() {
    if (!originalImage) return;
    canvas.width = originalImage.width;
    canvas.height = originalImage.height;
    ctx.drawImage(originalImage, 0, 0);
    updatePreview();
    showToast('已撤销所有打码');
  }

  function downloadResult() {
    if (!originalImage) { showToast('请先上传图片'); return; }
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = '隐私百宝箱_打码.png';
    a.click();
    showToast('下载成功');
  }
</script>
</body>
</html>
