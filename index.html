<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>修修图 · 智能图片工具</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>">
<style>
:root {
  --bg: #f7f5f2;
  --card: #ffffff;
  --text: #2c2416;
  --text2: #6b5e4e;
  --accent: #c8a96e;
  --accent2: #e5d5b0;
  --border: #e8e3da;
  --shadow: 0 4px 20px rgba(0,0,0,.04), 0 1px 2px rgba(0,0,0,.02);
  --shadow-lg: 0 12px 40px rgba(0,0,0,.06);
  --radius: 24px;
  --radius-sm: 16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
}
button,input,select{font-family:inherit}
button{cursor:pointer;border:none;background:none}
input[type="range"]{-webkit-appearance:none;width:100%;height:4px;border-radius:2px;background:#e0dcd4}
input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.1)}
/* 微动画 */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeIn .3s ease}
@keyframes spin{to{transform:rotate(360deg)}}
/* 滚动条 */
::-webkit-scrollbar{width:0;height:0}
</style>
</head>
<body>
<div id="root"></div>
<script>
const DOCS=[
  {id:"cn_passport",flag:"🇨🇳",label:"中国护照",size:"33×48mm",notes:"白底，免冠"},
  {id:"us_visa",flag:"🇺🇸",label:"美国签证",size:"2×2″",notes:"白底，近6月"},
  {id:"id_card",flag:"🪪",label:"身份证",size:"26×32mm",notes:"蓝底，免冠"},
  {id:"linkedin",flag:"💼",label:"LinkedIn",size:"400×400px",notes:"专业形象"},
];
const BGS=[
  {id:"white",hex:"#FFFFFF",label:"纯白"},
  {id:"blue",hex:"#4F7DC8",label:"证件蓝"},
  {id:"red",hex:"#BE3A3A",label:"红"},
  {id:"grey",hex:"#E6E6E6",label:"浅灰"},
];
const FORMATS=[{id:"image/jpeg",label:"JPG"},{id:"image/png",label:"PNG"},{id:"image/webp",label:"WebP"}];

function canvasBgReplace(imgSrc,hex){return new Promise((resolve)=>{
  const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas'),w=600,h=800;
    c.width=w;c.height=h;const ctx=c.getContext('2d');
    ctx.fillStyle=hex;ctx.fillRect(0,0,w,h);
    const s=Math.max(w/img.naturalWidth,h/img.naturalHeight);
    ctx.drawImage(img,(w-img.naturalWidth*s)/2,(h-img.naturalHeight*s)/2,img.naturalWidth*s,img.naturalHeight*s);
    const d=ctx.getImageData(0,0,w,h).data;
    let r=0,g=0,b=0,n=0;
    for(let x=0;x<w;x+=8){[0,1,h-1,h-2].forEach(y=>{const i=(y*w+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++;})}
    for(let y=0;y<h;y+=8){[0,1,w-1,w-2].forEach(x=>{const i=(y*w+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++;})}
    r/=n;g/=n;b/=n;
    const tR=parseInt(hex.slice(1,3),16),tG=parseInt(hex.slice(3,5),16),tB=parseInt(hex.slice(5,7),16);
    const visited=new Uint8Array(w*h),seeds=[];
    for(let x=0;x<w;x++)seeds.push([x,0],[x,h-1]);
    for(let y=1;y<h-1;y++)seeds.push([0,y],[w-1,y]);
    const H=45,S=75;let qi=0;
    while(qi<seeds.length){
      const[sx,sy]=seeds[qi++];if(sx<0||sx>=w||sy<0||sy>=h)continue;
      const idx=sy*w+sx;if(visited[idx])continue;visited[idx]=1;
      const pi=idx*4,dist=Math.sqrt((d[pi]-r)**2+(d[pi+1]-g)**2+(d[pi+2]-b)**2);
      if(dist>S)continue;
      const a=dist<H?1:1-(dist-H)/(S-H);
      d[pi]=Math.round(d[pi]*(1-a)+tR*a);d[pi+1]=Math.round(d[pi+1]*(1-a)+tG*a);d[pi+2]=Math.round(d[pi+2]*(1-a)+tB*a);
      seeds.push([sx+1,sy],[sx-1,sy],[sx,sy+1],[sx,sy-1]);
    }
    ctx.putImageData(new ImageData(d,w,h),0,0);
    resolve(c.toDataURL('image/jpeg',.93));
  };img.src=imgSrc;
})}

function convertFormat(src,fmt,q){return new Promise((resolve)=>{
  const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    c.getContext('2d').drawImage(img,0,0);
    c.toBlob(b=>resolve({url:URL.createObjectURL(b),blob:b,size:b.size}),fmt,q/100);
  };img.src=src;
})}

function resizeImage(src,w,h,fmt,q,mode){return new Promise((resolve)=>{
  const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');
    if(mode==='fill'){ctx.drawImage(img,0,0,w,h)}
    else{
      const r=img.naturalWidth/img.naturalHeight,tr=w/h;
      let dw,dh,ox,oy;
      if(r>tr){dw=w;dh=w/r;ox=0;oy=(h-dh)/2}else{dh=h;dw=h*r;ox=(w-dw)/2;oy=0}
      ctx.fillStyle='#FFFFFF';ctx.fillRect(0,0,w,h);ctx.drawImage(img,ox,oy,dw,dh);
    }
    c.toBlob(b=>resolve({url:URL.createObjectURL(b),blob:b,size:b.size,w,h}),fmt,q/100);
  };img.src=src;
})}

let state={tab:'idphoto',phase:'idle',src:null,proc:null,doc:DOCS[0],bg:BGS[0],result:null,
  convFmt:FORMATS[0],convQ:80,convRes:null,convSize:0,convBlob:null,
  rw:800,rh:600,rFmt:FORMATS[0],rQ:80,rRes:null,rSize:0,rBlob:null,rMode:'fit'};
let iw='800',ih='600';

function set(upd){Object.assign(state,upd);render()}
const m=()=>window.innerWidth<=768;

function loadImg(file,cb){
  if(!file||!file.type.startsWith('image/'))return;
  const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(file);
}

async function processId(){
  if(!state.src)return;set({phase:'proc'});
  let p=state.src;try{p=await canvasBgReplace(state.src,state.bg.hex)}catch(e){}
  set({proc:p,phase:'done',result:{score:85,overall:'pass',checks:[{name:'背景',status:'pass'},{name:'光线',status:'pass'},{name:'表情',status:'pass'},{name:'尺寸',status:'pass'}]}});
}
async function processConv(){
  if(!state.src)return;set({convRes:null});
  const r=await convertFormat(state.src,state.convFmt.id,state.convQ);
  set({convRes:r.url,convSize:r.size,convBlob:r.blob});
}
async function processResize(){
  if(!state.src)return;
  const w=parseInt(iw),h=parseInt(ih);
  if(!isNaN(w)&&w>0&&!isNaN(h)&&h>0)set({rw:Math.round(w),rh:Math.round(h)});
  set({rRes:null});
  const r=await resizeImage(state.src,state.rw,state.rh,state.rFmt.id,state.rQ,state.rMode);
  set({rRes:r.url,rSize:r.size,rBlob:r.blob,rw:r.w,rh:r.h});
}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}

// 渲染
function H(){
  return `<div style="height:100vh;display:flex;flex-direction:column;background:var(--bg)">
    <header style="padding:${m()?12:16}px 20px;display:flex;align-items:center;justify-content:space-between;gap:16px">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="width:40px;height:40px;border-radius:14px;background:linear-gradient(135deg,#d4b87a,#b08d48);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 12px rgba(200,169,110,.3)">✨</div>
        <div><div style="font-size:20px;font-weight:800;color:var(--text);letter-spacing:-.5px">修修图</div><div style="font-size:11px;color:var(--text2)">智能图片工具</div></div>
      </div>
      <div style="display:flex;gap:6px;background:#fff;border-radius:30px;padding:4px;box-shadow:var(--shadow)">
        ${[{t:'idphoto',i:'🪪',l:'证件照'},{t:'convert',i:'🔄',l:'转换'},{t:'resize',i:'📐',l:'尺寸'}].map(x=>`
          <button onclick="set({tab:'${x.t}'})" style="padding:8px ${m()?12:18}px;border-radius:26px;font-size:13px;font-weight:700;transition:all .2s;background:${state.tab===x.t?'var(--accent)':'transparent'};color:${state.tab===x.t?'#fff':'var(--text2)'}">${m()?x.i:x.i+' '+x.l}</button>
        `).join('')}
      </div>
    </header>
    <div style="flex:1;overflow:auto;padding:0 20px 20px">
      ${state.tab==='idphoto'?Id():state.tab==='convert'?Conv():Resize()}
    </div>
  </div>`;
}

function Id(){
  const s=state;const up=!s.src;
  return `<div style="display:flex;flex-direction:${m()?'column':'row'};gap:16px;height:${m()?'auto':'100%'}">
    <div style="${m()?'':'width:300px;flex-shrink:0'} background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px">
      <div style="font-size:14px;font-weight:700">📸 制作证件照</div>
      ${up?`
        <div onclick="document.getElementById('f1').click()" style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 20px;text-align:center;cursor:pointer;background:#fcfaf7;transition:.2s">
          <div style="font-size:40px;margin-bottom:8px">🪪</div>
          <div style="font-weight:600;color:var(--text)">点击上传照片</div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">JPG / PNG / 最大20MB</div>
        </div>
      `:`
        <div style="border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--border)"><img src="${s.src}" style="width:100%;display:block"></div>
        <button onclick="set({src:null,phase:'idle',proc:null,result:null})" style="align-self:flex-start;font-size:11px;color:var(--text2);text-decoration:underline">重新选择</button>
      `}
      <input id="f1" type="file" accept="image/*" hidden onchange="if(this.files[0])loadImg(this.files[0],r=>set({src:r,phase:'ready'}))"/>
      <div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">证件类型</div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${DOCS.map(d=>`<button onclick="set({doc:DOCS.find(x=>x.id==='${d.id}')})" style="padding:6px 12px;border-radius:20px;font-size:12px;border:1.5px solid ${s.doc.id===d.id?'var(--accent)':'var(--border)'};background:${s.doc.id===d.id?'#fdf8f0':'#fff'};font-weight:${s.doc.id===d.id?'700':'400'}">${d.flag} ${d.label}</button>`).join('')}
        </div>
      </div>
      <div>
        <div style="font-size:10px;color:var(--text2);margin-bottom:6px;font-weight:700;text-transform:uppercase;letter-spacing:.5px">背景色</div>
        <div style="display:flex;gap:8px">${BGS.map(b=>`<div onclick="set({bg:BGS.find(x=>x.id==='${b.id}')})" title="${b.label}" style="width:28px;height:28px;border-radius:50%;background:${b.hex};border:2px solid ${s.bg.id===b.id?'var(--accent)':'var(--border)'};cursor:pointer;box-shadow:${b.hex==='#FFFFFF'?'inset 0 0 0 1px #ddd':'none'}"></div>`).join('')}</div>
      </div>
      <button onclick="processId()" disabled="${!s.src}" style="width:100%;padding:14px;background:${s.src?'linear-gradient(135deg,#d4b87a,#b08d48)':'#e0dcd4'};color:${s.src?'#fff':'#aaa'};border-radius:var(--radius-sm);font-size:15px;font-weight:700;box-shadow:${s.src?'0 4px 16px rgba(200,169,110,.3)':'none'}">${s.phase==='done'?'🔄 重新生成':'✨ 开始制作'}</button>
    </div>
    <div style="flex:1;background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center">
      ${s.phase==='idle'?`<div style="text-align:center;color:var(--text2)"><div style="font-size:64px;margin-bottom:12px">🪪</div><div style="font-weight:600;font-size:16px">上传左侧照片，一键生成证件照</div><div style="font-size:12px;margin-top:6px">纯本地处理，隐私安全</div></div>`
      :s.phase==='ready'?`<div style="text-align:center"><div style="font-weight:600;margin-bottom:12px">照片已就绪</div><div style="border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08);max-width:360px;margin:0 auto"><img src="${s.src}" style="width:100%;display:block"></div><div style="margin-top:12px;color:var(--text2);font-size:12px">${s.doc.flag} ${s.doc.label} · ${s.bg.label}背景</div></div>`
      :s.phase==='proc'?`<div style="text-align:center"><div style="width:40px;height:40px;border-radius:50%;border:3px solid #eee;border-top-color:var(--accent);animation:spin .8s linear infinite;margin:0 auto 12px"></div><div style="font-weight:600">智能处理中…</div></div>`
      :s.phase==='done'&&s.proc?`<div class="anim" style="width:100%"><div style="font-weight:700;margin-bottom:16px;font-size:16px;text-align:center">✨ 证件照生成完成</div><div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px"><div style="flex:1;min-width:140px;text-align:center"><div style="font-size:10px;color:var(--text2);margin-bottom:4px">处理前</div><div style="border-radius:12px;overflow:hidden;border:2px solid var(--border)"><img src="${s.src}" style="width:100%"></div></div><div style="flex:1;min-width:140px;text-align:center"><div style="font-size:10px;color:var(--accent);margin-bottom:4px;font-weight:700">处理后</div><div style="border-radius:12px;overflow:hidden;border:2px solid ${s.bg.hex};background:${s.bg.hex}"><img src="${s.proc}" style="width:100%"></div></div></div><div style="display:flex;gap:10px;justify-content:center"><a href="${s.proc}" download="xiuxiutu_id.jpg"><button style="padding:10px 24px;background:#f5f0e8;border:1px solid var(--border);border-radius:25px;color:var(--text);font-weight:600">⬇ 下载</button></a><button onclick="set({pay:true})" style="padding:10px 24px;background:linear-gradient(135deg,#d4b87a,#b08d48);color:#fff;border-radius:25px;font-weight:700">升级高清版</button></div></div>`:''}
    </div>
  </div>`;
}

function Conv(){
  const s=state;
  return `<div style="display:flex;flex-direction:${m()?'column':'row'};gap:16px;height:${m()?'auto':'100%'}">
    <div style="${m()?'':'width:300px;flex-shrink:0'} background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px">
      <div style="font-size:14px;font-weight:700">🔄 格式转换</div>
      ${!s.src?`<div onclick="document.getElementById('f2').click()" style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 20px;text-align:center;cursor:pointer;background:#fcfaf7"><div style="font-size:40px">🖼️</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>`
      :`<div style="border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--border)"><img src="${s.src}" style="width:100%"></div><button onclick="set({src:null,convRes:null})" style="align-self:flex-start;font-size:11px;color:var(--text2);text-decoration:underline">重选</button>`}
      <input id="f2" type="file" accept="image/*" hidden onchange="if(this.files[0])loadImg(this.files[0],r=>set({src:r,convRes:null}))"/>
      <div style="display:flex;gap:6px">
        ${FORMATS.map(f=>`<button onclick="set({convFmt:FORMATS.find(x=>x.id==='${f.id}')})" style="flex:1;padding:8px;border-radius:12px;font-size:13px;font-weight:700;border:2px solid ${s.convFmt.id===f.id?'var(--accent)':'var(--border)'};background:${s.convFmt.id===f.id?'#fdf8f0':'#fff'}">${f.label}</button>`).join('')}
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:11px;color:var(--text2)">质量</span>
        <input type="range" min="10" max="100" value="${s.convQ}" oninput="set({convQ:parseInt(this.value)})">
        <span style="font-weight:700;font-size:13px">${s.convQ}%</span>
      </div>
      <button onclick="processConv()" disabled="${!s.src}" style="width:100%;padding:14px;background:${s.src?'linear-gradient(135deg,#d4b87a,#b08d48)':'#e0dcd4'};color:${s.src?'#fff':'#aaa'};border-radius:var(--radius-sm);font-size:15px;font-weight:700;box-shadow:${s.src?'0 4px 16px rgba(200,169,110,.3)':'none'}">🔄 开始转换</button>
    </div>
    <div style="flex:1;background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center">
      ${s.convRes?`<div class="anim" style="text-align:center"><div style="font-weight:600;margin-bottom:10px">转换完成 · ${(s.convSize/1024).toFixed(1)} KB</div><img src="${s.convRes}" style="max-width:100%;max-height:60vh;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px"><button onclick="dl(state.convBlob,'xiuxiutu_convert.'+state.convFmt.id.split('/')[1])" style="padding:10px 24px;background:linear-gradient(135deg,#d4b87a,#b08d48);color:#fff;border-radius:25px;font-weight:700">⬇ 下载</button></div>`
      :`<div style="text-align:center;color:var(--text2)"><div style="font-size:48px;margin-bottom:12px">🔄</div><div style="font-weight:600">上传图片，选择格式，一键转换</div></div>`}
    </div>
  </div>`;
}

function Resize(){
  const s=state;
  return `<div style="display:flex;flex-direction:${m()?'column':'row'};gap:16px;height:${m()?'auto':'100%'}">
    <div style="${m()?'':'width:300px;flex-shrink:0'} background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:14px">
      <div style="font-size:14px;font-weight:700">📐 尺寸调整</div>
      ${!s.src?`<div onclick="document.getElementById('f3').click()" style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 20px;text-align:center;cursor:pointer;background:#fcfaf7"><div style="font-size:40px">📐</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>`
      :`<div style="border-radius:var(--radius-sm);overflow:hidden;border:2px solid var(--border)"><img src="${s.src}" style="width:100%"></div><button onclick="set({src:null,rRes:null})" style="align-self:flex-start;font-size:11px;color:var(--text2);text-decoration:underline">重选</button>`}
      <input id="f3" type="file" accept="image/*" hidden onchange="if(this.files[0])loadImg(this.files[0],r=>{const img=new Image();img.onload=()=>{iw=String(img.naturalWidth);ih=String(img.naturalHeight);set({src:r,rw:img.naturalWidth,rh:img.naturalHeight,rRes:null})};img.src=r})"/>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--text2)">宽</span>
        <input type="number" value="${iw}" oninput="iw=this.value" style="width:70px;padding:8px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;text-align:center">
        <span>×</span>
        <span style="font-size:11px;color:var(--text2)">高</span>
        <input type="number" value="${ih}" oninput="ih=this.value" style="width:70px;padding:8px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;font-weight:700;text-align:center">
      </div>
      <div style="display:flex;gap:4px">
        <button onclick="set({rMode:'fit'})" style="flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:700;border:2px solid ${s.rMode==='fit'?'var(--accent)':'var(--border)'};background:${s.rMode==='fit'?'#fdf8f0':'#fff'}">📐 等比例</button>
        <button onclick="set({rMode:'fill'})" style="flex:1;padding:8px;border-radius:10px;font-size:12px;font-weight:700;border:2px solid ${s.rMode==='fill'?'var(--accent)':'var(--border)'};background:${s.rMode==='fill'?'#fdf8f0':'#fff'}">📏 拉伸</button>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span style="font-size:11px;color:var(--text2)">格式</span>
        <select onchange="set({rFmt:FORMATS.find(x=>x.id===this.value)})" style="padding:6px;border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600">${FORMATS.map(f=>`<option value="${f.id}" ${s.rFmt.id===f.id?'selected':''}>${f.label}</option>`).join('')}</select>
        <span style="font-size:11px;color:var(--text2)">质量</span>
        <input type="range" min="10" max="100" value="${s.rQ}" oninput="set({rQ:parseInt(this.value)})" style="flex:1">
        <span style="font-weight:700;font-size:12px">${s.rQ}%</span>
      </div>
      <button onclick="processResize()" disabled="${!s.src}" style="width:100%;padding:14px;background:${s.src?'linear-gradient(135deg,#d4b87a,#b08d48)':'#e0dcd4'};color:${s.src?'#fff':'#aaa'};border-radius:var(--radius-sm);font-size:15px;font-weight:700;box-shadow:${s.src?'0 4px 16px rgba(200,169,110,.3)':'none'}">📐 开始调整</button>
    </div>
    <div style="flex:1;background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);display:flex;align-items:center;justify-content:center">
      ${s.rRes?`<div class="anim" style="text-align:center"><div style="font-weight:600;margin-bottom:10px">${s.rw}×${s.rh}px · ${(s.rSize/1024).toFixed(1)} KB · ${s.rMode==='fit'?'等比例':'拉伸'}</div><img src="${s.rRes}" style="max-width:100%;max-height:60vh;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.08);margin-bottom:14px"><button onclick="dl(state.rBlob,'xiuxiutu_resize.'+state.rFmt.id.split('/')[1])" style="padding:10px 24px;background:linear-gradient(135deg,#d4b87a,#b08d48);color:#fff;border-radius:25px;font-weight:700">⬇ 下载</button></div>`
      :`<div style="text-align:center;color:var(--text2)"><div style="font-size:48px;margin-bottom:12px">📐</div><div style="font-weight:600">上传图片，设置尺寸，一键调整</div></div>`}
    </div>
  </div>`;
}

function render(){
  document.getElementById('root').innerHTML = H();
}
render();
window.addEventListener('resize',render);
</script>
</body>
</html>
