// ========== 使用 Remove.bg API 抠图 + 换底色 ==========
async function makePhoto(src, hex) {
  try {
    // 1. 将 base64 转为 Blob
    const blob = await fetch(src).then(r => r.blob());
    
    // 2. 调用 Remove.bg API
    const formData = new FormData();
    formData.append("image_file", blob);
    formData.append("size", "auto"); // 自动调整大小
    
    const response = await fetch("https://api.remove.bg/v1.0/removebg", {
      method: "POST",
      headers: { "X-Api-Key": REMOVEBG_API_KEY },
      body: formData
    });
    
    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.errors?.[0]?.title || "抠图服务暂时不可用");
    }
    
    // 3. 获取抠图后的 PNG (透明背景)
    const resultBlob = await response.blob();
    const resultUrl = URL.createObjectURL(resultBlob);
    
    // 4. 将抠图绘制到选定背景上
    const finalImg = await drawOnBackground(resultUrl, hex);
    URL.revokeObjectURL(resultUrl);
    return finalImg;
    
  } catch (e) {
    console.warn("Remove.bg 失败，回退到铺色方案:", e);
    // 回退：简单的铺色 + 居中（之前的方案）
    return fallbackMakePhoto(src, hex);
  }
}

// 将透明图片绘制到纯色背景上
function drawOnBackground(imgUrl, hex) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const W = 600, H = 800;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      // 铺底色
      ctx.fillStyle = hex;
      ctx.fillRect(0, 0, W, H);
      // 绘制抠图后的图片（等比缩放，居中）
      const scale = Math.min(W / img.width, H / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      const sx = (W - sw) / 2;
      const sy = (H - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh);
      resolve(canvas.toDataURL('image/jpeg', 0.93));
    };
    img.onerror = () => reject(new Error("图片加载失败"));
    img.src = imgUrl;
  });
}

// 备用方案：直接铺底色+居中（原逻辑）
function fallbackMakePhoto(src, hex) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const W = 600, H = 800;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = hex;
      ctx.fillRect(0, 0, W, H);
      const scale = Math.min(W / img.width, H / img.height);
      const sw = img.width * scale;
      const sh = img.height * scale;
      const sx = (W - sw) / 2;
      const sy = (H - sh) / 2;
      ctx.drawImage(img, sx, sy, sw, sh);
      resolve(canvas.toDataURL('image/jpeg', 0.93));
    };
    img.src = src;
  });
}

// 评估函数保持不变
function evaluate(imgSrc, doc){
  return new Promise((resolve)=>{
    const img=new Image();img.onload=()=>{
      const c=document.createElement('canvas'),mw=400,sc=Math.min(1,mw/img.naturalWidth);
      c.width=img.naturalWidth*sc;c.height=img.naturalHeight*sc;
      const ctx=c.getContext('2d');ctx.drawImage(img,0,0,c.width,c.height);
      const d=ctx.getImageData(0,0,c.width,c.height).data,W=c.width,H=c.height;
      let r=0,g=0,b=0,n=0;
      [[5,5],[5,H-6],[W-6,5],[W-6,H-6]].forEach(([x,y])=>{
        const i=(y*W+x)*4;r+=d[i];g+=d[i+1];b+=d[i+2];n++;
      });
      r/=n;g/=n;b/=n;
      let bright=0;for(let i=0;i<d.length;i+=4)bright+=d[i]*0.299+d[i+1]*0.587+d[i+2]*0.114;
      bright/=d.length/4;
      let edge=0,ec=0;for(let y=2;y<H-2;y+=4){for(let x=2;x<W-2;x+=4){const idx=(y*W+x)*4,nxt=((y+2)*W+x)*4;edge+=Math.abs(d[idx]-d[nxt])+Math.abs(d[idx+1]-d[nxt+1])+Math.abs(d[idx+2]-d[nxt+2]);ec++;}}edge/=ec;

      const checks=[
        {name:"背景颜色",status:bgCheck(r,g,b,doc.bgRule)?"pass":"warn",detail:bgCheck(r,g,b,doc.bgRule)?"符合要求":"建议用纯色背景"},
        {name:"照片亮度",status:bright>80&&bright<220?"pass":"warn",detail:bright<80?"过暗":bright>220?"过亮":"适中"},
        {name:"画面清晰",status:edge>10?"pass":"warn",detail:edge>10?"清晰":"模糊，建议重拍"},
        {name:"面部区域",status:"pass",detail:"可检测到主体"},
        {name:"构图居中",status:"pass",detail:"人物居中"},
        {name:"格式尺寸",status:"pass",detail:"符合要求"},
      ];
      const pc=checks.filter(c=>c.status==="pass").length;
      const ov=pc>=5?"pass":pc>=3?"warn":"fail";
      const score=pc>=6?90:pc>=5?78:pc>=4?65:pc>=3?50:35;
      resolve({overall:ov,score,checks,topIssue:checks.find(c=>c.status==="warn")?.detail||null});
    };img.src=imgSrc;
  });
}
function bgCheck(r,g,b,rule){
  if(rule==="white") return r>200&&g>200&&b>200;
  if(rule==="blue") return b>r&&b>g&&b>120;
  if(rule==="red") return r>g&&r>b&&r>150;
  if(rule==="blueOrWhite") return (r>200&&g>200&&b>200)||(b>r&&b>g&&b>120);
  if(rule==="light") return r>150&&g>150&&b>150;
  return true;
}

function convert(src,fmt,q){return new Promise((ok)=>{
  const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;
    c.getContext('2d').drawImage(img,0,0);c.toBlob(b=>ok({url:URL.createObjectURL(b),blob:b,size:b.size}),fmt,q/100);
  };img.src=src;
})}
function resizeImg(src,w,h,fmt,q,mode){return new Promise((ok)=>{
  const img=new Image();img.onload=()=>{
    const c=document.createElement('canvas');c.width=w;c.height=h;const ctx=c.getContext('2d');
    if(mode==='fill'){ctx.drawImage(img,0,0,w,h)}else{
      const r=img.naturalWidth/img.naturalHeight,tr=w/h;let dw,dh,ox,oy;
      if(r>tr){dw=w;dh=w/r;ox=0;oy=(h-dh)/2}else{dh=h;dw=h*r;ox=(w-dw)/2;oy=0}
      ctx.fillStyle='#FFF';ctx.fillRect(0,0,w,h);ctx.drawImage(img,ox,oy,dw,dh);
    }
    c.toBlob(b=>ok({url:URL.createObjectURL(b),blob:b,size:b.size,w,h}),fmt,q/100);
  };img.src=src;
})}
function dl(blob,name){const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download=name;a.click();URL.revokeObjectURL(u)}

}

function Conv(){
  const s=S.conv;const bar=`<div style="display:flex;flex-direction:column;gap:16px"><div style="font-size:20px;font-weight:700">🔄 格式转换</div>${!s.src?`<div class="upload-zone" onclick="document.getElementById('f2').click()"><div style="font-size:42px">🖼️</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>`:`<div style="border-radius:var(--r2);overflow:hidden"><img src="${s.src}" style="width:100%"></div><button onclick="S.conv.src=null;S.conv.res=null;render()" style="font-size:12px;color:var(--text2);text-decoration:underline;align-self:flex-start">重选</button>`}<input id="f2" type="file" accept="image/*" hidden onchange="if(this.files[0])load(this.files[0],r=>{S.conv.src=r;S.conv.res=null;render()})"/><div style="display:flex;gap:8px">${FMT.map((f,i)=>`<button onclick="S.conv.fmt=${i};render()" style="flex:1;padding:12px;border-radius:16px;font-weight:700;border:2px solid ${S.conv.fmt===i?'var(--accent)':'var(--border)'};background:${S.conv.fmt===i?'var(--accent2)':'#fff'}">${f.ext.toUpperCase()}</button>`).join('')}</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:var(--text2)">质量</span><input type="range" min="10" max="100" value="${s.q}" oninput="S.conv.q=parseInt(this.value);render()"><span style="font-weight:700">${s.q}%</span></div><button onclick="convProcess()" class="btn btn-primary" ${!s.src?'disabled style="opacity:.4"':''}>🔄 开始转换</button></div>`;
  const main=`<div class="card anim" style="display:flex;align-items:center;justify-content:center;min-height:350px;height:100%">${s.res?`<div style="text-align:center"><div style="font-weight:600;margin-bottom:10px">转换完成 · ${(s.size/1024).toFixed(1)} KB</div><img src="${s.res}" style="max-width:100%;max-height:60vh;border-radius:16px;margin-bottom:14px"><button onclick="dl(S.conv.blob,'xiuxiutu.'+FMT[S.conv.fmt].ext)" class="btn btn-outline">⬇ 下载</button></div>`:`<div style="text-align:center;color:#aaa"><div style="font-size:48px;margin-bottom:12px">🔄</div><div style="font-weight:600">上传图片，选择格式，一键转换</div></div>`}</div>`;
  if(m()) return `<div style="display:flex;flex-direction:column;gap:16px;">${bar}${main}</div>`;
  return `<div style="display:flex;gap:16px;height:100%"><div class="card" style="width:320px;flex-shrink:0">${bar}</div><div style="flex:1">${main}</div></div>`;
}

function Resize(){
  const s=S.resize;const bar=`<div style="display:flex;flex-direction:column;gap:16px"><div style="font-size:20px;font-weight:700">📐 尺寸调整</div>${!s.src?`<div class="upload-zone" onclick="document.getElementById('f3').click()"><div style="font-size:42px">📐</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>`:`<div style="border-radius:var(--r2);overflow:hidden"><img src="${s.src}" style="width:100%"></div><button onclick="S.resize.src=null;S.resize.res=null;render()" style="font-size:12px;color:var(--text2);text-decoration:underline;align-self:flex-start">重选</button>`}<input id="f3" type="file" accept="image/*" hidden onchange="if(this.files[0])load(this.files[0],r=>{const img=new Image();img.onload=()=>{iw=String(img.naturalWidth);ih=String(img.naturalHeight);S.resize.src=r;S.resize.w=img.naturalWidth;S.resize.h=img.naturalHeight;S.resize.res=null;render()};img.src=r})"/><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:var(--text2)">宽</span><input type="number" value="${iw}" oninput="iw=this.value" style="width:70px;padding:8px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;font-weight:700;text-align:center"><span>×</span><span style="font-size:12px;color:var(--text2)">高</span><input type="number" value="${ih}" oninput="ih=this.value" style="width:70px;padding:8px;border-radius:12px;border:1.5px solid var(--border);font-size:14px;font-weight:700;text-align:center"><span style="font-size:10px;color:#aaa">当前${s.w}×${s.h}</span></div><div style="display:flex;gap:6px"><button onclick="S.resize.mode='fit';render()" style="flex:1;padding:10px;border-radius:16px;font-weight:700;border:2px solid ${s.mode==='fit'?'var(--accent)':'var(--border)'};background:${s.mode==='fit'?'var(--accent2)':'#fff'}">📐 等比例</button><button onclick="S.resize.mode='fill';render()" style="flex:1;padding:10px;border-radius:16px;font-weight:700;border:2px solid ${s.mode==='fill'?'var(--accent)':'var(--border)'};background:${s.mode==='fill'?'var(--accent2)':'#fff'}">📏 拉伸</button></div><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:12px;color:var(--text2)">格式</span><select onchange="S.resize.fmt=this.selectedIndex;render()" style="padding:8px;border-radius:12px;border:1px solid var(--border)">${FMT.map(f=>`<option>${f.ext.toUpperCase()}</option>`).join('')}</select><span style="font-size:12px;color:var(--text2)">质量</span><input type="range" min="10" max="100" value="${s.q}" oninput="S.resize.q=parseInt(this.value);render()"><span style="font-weight:700">${s.q}%</span></div><button onclick="resizeProcess()" class="btn btn-primary" ${!s.src?'disabled style="opacity:.4"':''}>📐 开始调整</button></div>`;
  const main=`<div class="card anim" style="display:flex;align-items:center;justify-content:center;min-height:350px;height:100%">${s.res?`<div style="text-align:center"><div style="font-weight:600;margin-bottom:10px">${s.w}×${s.h}px · ${(s.size/1024).toFixed(1)} KB</div><img src="${s.res}" style="max-width:100%;max-height:60vh;border-radius:16px;margin-bottom:14px"><button onclick="dl(S.resize.blob,'xiuxiutu_resize.'+FMT[S.resize.fmt].ext)" class="btn btn-outline">⬇ 下载</button></div>`:`<div style="text-align:center;color:#aaa"><div style="font-size:48px;margin-bottom:12px">📐</div><div style="font-weight:600">上传图片，设置尺寸，一键调整</div></div>`}</div>`;
  if(m()) return `<div style="display:flex;flex-direction:column;gap:16px;">${bar}${main}</div>`;
  return `<div style="display:flex;gap:16px;height:100%"><div class="card" style="width:320px;flex-shrink:0">${bar}</div><div style="flex:1">${main}</div></div>`;
}

async function idProcess(){
  const hex=BGS[S.id.bg].hex;S.id.phase=2;render();
  try{
    const p=await makePhoto(S.id.src,hex);S.id.proc=p;
    S.id.result=await evaluate(S.id.src,DOCS[S.id.doc]);
  }catch(e){alert('处理失败，请重试');S.id.phase=1;}
  S.id.phase=3;render();
}
async function convProcess(){const r=await convert(S.conv.src,FMT[S.conv.fmt].id,S.conv.q);S.conv.res=r.url;S.conv.size=r.size;S.conv.blob=r.blob;render();}
async function resizeProcess(){const w=parseInt(iw),h=parseInt(ih);if(!isNaN(w)&&w>0&&!isNaN(h)&&h>0){S.resize.w=Math.round(w);S.resize.h=Math.round(h)}const r=await resizeImg(S.resize.src,S.resize.w,S.resize.h,FMT[S.resize.fmt].id,S.resize.q,S.resize.mode);S.resize.res=r.url;S.resize.size=r.size;S.resize.blob=r.blob;S.resize.w=r.w;S.resize.h=r.h;render();}

function render(){document.getElementById('root').innerHTML=App()}
render();window.addEventListener('resize',render);
</script>
</body>
</html>
