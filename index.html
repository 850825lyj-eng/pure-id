// ========== EXIF 读取 ==========
function readExif(file) {
  return new Promise((resolve) => {
    if (typeof exifr === 'undefined') {
      const script = document.createElement('script');
      script.src = 'https://cdn.jsdelivr.net/npm/exifr@7.1.3/dist/lite.umd.js';
      script.onload = () => doParse(file, resolve);
      script.onerror = () => resolve({ info: [], hasGPS: false, hasCamera: false, riskLevel: 'low', rawData: null });
      document.head.appendChild(script);
    } else {
      doParse(file, resolve);
    }
  });
}

async function doParse(file, resolve) {
  try {
    const data = await exifr.parse(file, { gps: true, tiff: true, iptc: true, xmp: true, icc: true });
    if (!data) { resolve({ info: [], hasGPS: false, hasCamera: false, riskLevel: 'low', rawData: null }); return; }
    const rawEntries = [];
    for (const key in data) {
      if (data[key] !== undefined && data[key] !== null && key !== 'constructor') {
        rawEntries.push({ key, val: typeof data[key] === 'object' ? JSON.stringify(data[key]) : String(data[key]) });
      }
    }
    const info = [];
    let hasGPS = false, hasCamera = false;
    let lat = null, lng = null;
    if (data.latitude !== undefined && data.longitude !== undefined) { lat = data.latitude; lng = data.longitude; }
    else if (data.GPSLatitude !== undefined && data.GPSLongitude !== undefined) { lat = data.GPSLatitude; lng = data.GPSLongitude; }
    else if (data.gps && data.gps.latitude !== undefined && data.gps.longitude !== undefined) { lat = data.gps.latitude; lng = data.gps.longitude; }
    else if (data.GPS && data.GPS.latitude !== undefined && data.GPS.longitude !== undefined) { lat = data.GPS.latitude; lng = data.GPS.longitude; }
    if (lat !== null && lng !== null) {
      hasGPS = true;
      info.push({ name: '📍 GPS 位置', value: Number(lat).toFixed(4) + ', ' + Number(lng).toFixed(4), risk: 'high', detail: '此照片包含精确的拍摄地点坐标' });
    }
    if (data.DateTimeOriginal) {
      const dt = typeof data.DateTimeOriginal === 'string' ? data.DateTimeOriginal : data.DateTimeOriginal.toISOString();
      info.push({ name: '📅 拍摄时间', value: dt, risk: 'medium', detail: '此照片包含精确的拍摄日期和时间' });
    }
    if (data.Make || data.Model) {
      hasCamera = true;
      info.push({ name: '📷 拍摄设备', value: [data.Make, data.Model].filter(Boolean).join(' ') || '未知', risk: 'medium', detail: '此照片包含相机品牌、型号等信息' });
    }
    if (data.LensModel) { info.push({ name: '🔍 镜头型号', value: data.LensModel, risk: 'low', detail: '此照片包含使用的镜头信息' }); }
    if (data.FNumber) { info.push({ name: '⚙️ 光圈', value: 'f/' + data.FNumber, risk: 'low', detail: '此照片包含光圈设置' }); }
    if (data.ExposureTime) { info.push({ name: '⏱️ 快门速度', value: data.ExposureTime < 1 ? '1/' + Math.round(1/data.ExposureTime) + ' 秒' : data.ExposureTime + ' 秒', risk: 'low', detail: '此照片包含快门速度' }); }
    if (data.ISO) { info.push({ name: '💡 ISO', value: 'ISO ' + data.ISO, risk: 'low', detail: '此照片包含感光度设置' }); }
    if (data.ImageWidth && data.ImageHeight) { info.push({ name: '📐 分辨率', value: data.ImageWidth + ' × ' + data.ImageHeight + ' px', risk: 'low', detail: '原始照片的像素尺寸' }); }
    if (data.Software) { info.push({ name: '🖥️ 处理软件', value: data.Software, risk: 'low', detail: '此照片包含后期处理软件的版本信息' }); }
    let riskLevel = 'low';
    if (hasGPS) riskLevel = 'high';
    else if (hasCamera || info.some(i => i.name === '📅 拍摄时间')) riskLevel = 'medium';
    resolve({ info, hasGPS, hasCamera, riskLevel, rawData: rawEntries.length > 0 ? rawEntries : null });
  } catch (e) {
    resolve({ info: [], hasGPS: false, hasCamera: false, riskLevel: 'low', rawData: null });
  }
}

function clearExif(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        canvas.toBlob((blob) => {
          resolve({ url: URL.createObjectURL(blob), blob: blob, size: blob.size, width: canvas.width, height: canvas.height });
        }, file.type || 'image/jpeg', 0.95);
      };
      img.onerror = () => reject(new Error('图片加载失败'));
      img.src = e.target.result;
    };
    reader.onerror = () => reject(new Error('文件读取失败'));
    reader.readAsDataURL(file);
  });
}

function dl(blob, name) {
  const u = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = u; a.download = name; a.click();
  URL.revokeObjectURL(u);
}

function convert(src, fmt, q) { return new Promise((ok) => {
  const img = new Image(); img.onload = () => {
    const c = document.createElement('canvas'); c.width = img.naturalWidth; c.height = img.naturalHeight;
    c.getContext('2d').drawImage(img, 0, 0);
    c.toBlob(b => ok({ url: URL.createObjectURL(b), blob: b, size: b.size }), fmt, q/100);
  }; img.src = src;
}); }

function resizeImg(src, w, h, fmt, q, mode) { return new Promise((ok) => {
  const img = new Image(); img.onload = () => {
    const c = document.createElement('canvas'); c.width = w; c.height = h; const ctx = c.getContext('2d');
    if (mode === 'fill') { ctx.drawImage(img, 0, 0, w, h); } else {
      const r = img.naturalWidth / img.naturalHeight, tr = w / h; let dw, dh, ox, oy;
      if (r > tr) { dw = w; dh = w / r; ox = 0; oy = (h - dh) / 2; }
      else { dh = h; dw = h * r; ox = (w - dw) / 2; oy = 0; }
      ctx.fillStyle = '#FFF'; ctx.fillRect(0, 0, w, h); ctx.drawImage(img, ox, oy, dw, dh);
    }
    c.toBlob(b => ok({ url: URL.createObjectURL(b), blob: b, size: b.size, w, h }), fmt, q/100);
  }; img.src = src;
}); }

const FMT = [{ id: "image/jpeg", ext: "jpg" }, { id: "image/png", ext: "png" }, { id: "image/webp", ext: "webp" }];

let S = {

};
let iw = '800', ih = '600';
const m = () => window.innerWidth < 768;

function load(f, cb) {
  if (!f || !f.type.startsWith('image/')) return;
  const r = new FileReader();
  r.onload = e => cb(e.target.result);
  r.readAsDataURL(f);
}

      '</div>' +
      '<div style="display:flex;gap:6px;background:#fff;border-radius:30px;padding:3px;box-shadow:0 2px 10px rgba(0,0,0,.03);' + (isM ? 'justify-content:center' : '') + '">' +
        tabs.map((t, i) => '<button onclick="S.tab=' + i + ';render()" style="padding:8px ' + (isM ? 16 : 18) + 'px;border-radius:30px;font-size:' + (isM ? 14 : 13) + 'px;font-weight:700;background:' + (s.tab === i ? '#c8a96e' : 'transparent') + ';color:' + (s.tab === i ? '#fff' : '#6b6b6b') + '">' + t + '</button>').join('') +

    if (f2) f2.onchange = function() { if (this.files[0]) load(this.files[0], r => { S.conv.src = r; S.conv.res = null; render(); }); };
    if (f3) f3.onchange = function() {
      if (this.files[0]) load(this.files[0], r => {
        const img = new Image(); img.onload = () => { iw = String(img.naturalWidth); ih = String(img.naturalHeight); S.resize.src = r; S.resize.w = img.naturalWidth; S.resize.h = img.naturalHeight; S.resize.res = null; render(); }; img.src = r;
      });
    };
  }, 50);
}

    (up ? '<div class="upload-zone" onclick="document.getElementById(\'fp\').click()"><div style="font-size:42px">🔍</div><div style="font-weight:600;margin-top:8px">点击上传照片</div><div style="font-size:12px;color:#999;margin-top:4px">100% 本地处理，不上传服务器</div></div>'
    : '<div style="border-radius:18px;overflow:hidden;border:2px solid #e8e5e0"><img src="' + s.src + '" style="width:100%"></div><button onclick="S.privacy.phase=0;S.privacy.src=null;S.privacy.file=null;S.privacy.exif=null;S.privacy.cleanedBlob=null;render()" style="font-size:12px;color:#6b6b6b;text-decoration:underline;align-self:flex-start">重新选择</button>') +

    main += '<div style="margin-top:24px;background:#FFF8EC;border:1.5px solid #EDB84A;border-radius:16px;padding:18px 20px;text-align:left;max-width:420px;margin-left:auto;margin-right:auto">' +
      '<div style="display:flex;align-items:flex-start;gap:10px">' +
        '<span style="font-size:22px;flex-shrink:0;margin-top:2px">💡</span>' +
        '<div>' +
          '<div style="font-size:13px;font-weight:700;color:#A06A00;margin-bottom:6px">如何检测到隐私信息？</div>' +
          '<div style="font-size:12px;color:#6b5e4e;line-height:1.8">' +
            '用<strong>手机相机</strong>拍摄的原始照片（通过<strong>数据线导入</strong>或<strong>微信原图</strong>传输），通常包含 GPS 坐标和设备信息。<br>' +
            '朋友圈、微博等平台保存的图片已被自动清理，风险较低。' +
          '</div>' +
        '</div>' +
      '</div></div></div>';
  } else if (s.phase === 1) {
    main += '<div style="text-align:center"><div style="font-weight:600;margin-bottom:12px">照片已就绪</div><div style="border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.08);max-width:360px;margin:0 auto"><img src="' + s.src + '" style="width:100%"></div></div>';
  } else if (s.phase === 2 && s.exif) {
    main += '<div style="width:100%"><div style="font-weight:700;margin-bottom:16px;text-align:center">🔍 扫描结果</div>';
    const riskColors = { high: '#FEF0F0', medium: '#FFF8EC', low: '#EDF7F2' };
    const riskTextColors = { high: '#B03030', medium: '#A06A00', low: '#1A7F45' };
    const riskLabels = { high: '此照片包含位置信息', medium: '此照片包含个人信息', low: '未发现隐私信息' };
    main += '<div style="text-align:center;margin-bottom:16px"><span style="display:inline-block;padding:8px 24px;border-radius:30px;font-size:16px;font-weight:800;background:' + riskColors[s.exif.riskLevel] + ';color:' + riskTextColors[s.exif.riskLevel] + '">' + riskLabels[s.exif.riskLevel] + '</span>';
    if (s.exif.hasGPS) main += '<div style="font-size:13px;color:#B03030;margin-top:8px;font-weight:600">任何人收到原图都能获取你的精确拍摄地点</div>';
    if (s.exif.riskLevel === 'low' && s.exif.info.length === 0) {
      main += '<div style="margin-top:16px;background:#F0F7FF;border:1.5px solid #4F7DC8;border-radius:14px;padding:16px 18px;text-align:left;max-width:420px;margin-left:auto;margin-right:auto">' +
        '<div style="display:flex;align-items:flex-start;gap:10px">' +
          '<span style="font-size:20px;flex-shrink:0;margin-top:2px">💡</span>' +
          '<div>' +

      main += '<div style="font-size:10px;color:#999;max-height:200px;overflow:auto;background:#f9fafb;border-radius:8px;padding:10px">';

    }

    main += '<div style="text-align:center;font-size:12px;color:#6b6b6b">点击左下角"清除全部隐私信息"按钮，生成不含任何元数据的安全版本</div></div>';
  } else if (s.phase === 3 && s.cleanedBlob) {

  }
  main += '</div>';

  if (isM) return '<div style="display:flex;flex-direction:column;gap:16px;">' + bar + main + '</div>';
  return '<div style="display:flex;gap:16px;height:100%"><div class="card" style="width:340px;flex-shrink:0;overflow-y:auto;max-height:100%">' + bar + '</div><div style="flex:1;min-width:0">' + main + '</div></div>';

function renderConv() {
  const s = S.conv; const isM = m();
  const bar = '<div style="display:flex;flex-direction:column;gap:16px"><div style="font-size:20px;font-weight:700">🔄 格式转换</div>' +
    (!s.src ? '<div class="upload-zone" onclick="document.getElementById(\'f2\').click()"><div style="font-size:42px">🖼️</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>'
    : '<div style="border-radius:18px;overflow:hidden"><img src="' + s.src + '" style="width:100%"></div><button onclick="S.conv.src=null;S.conv.res=null;render()" style="font-size:12px;color:#6b6b6b;text-decoration:underline;align-self:flex-start">重选</button>') +
    '<input id="f2" type="file" accept="image/*" hidden/>' +
    '<div style="display:flex;gap:8px">' + FMT.map((f, i) => '<button onclick="S.conv.fmt=' + i + ';render()" style="flex:1;padding:12px;border-radius:16px;font-weight:700;border:2px solid ' + (s.fmt === i ? '#c8a96e' : '#e8e5e0') + ';background:' + (s.fmt === i ? '#f5efe4' : '#fff') + '">' + f.ext.toUpperCase() + '</button>').join('') + '</div>' +
    '<div style="display:flex;align-items:center;gap:8px"><span style="font-size:12px;color:#6b6b6b">质量</span><input type="range" min="10" max="100" value="' + s.q + '" oninput="S.conv.q=parseInt(this.value);render()"><span style="font-weight:700">' + s.q + '%</span></div>' +
    '<button onclick="convProcess()" class="btn btn-primary"' + (!s.src ? ' disabled style="opacity:.4"' : '') + '>🔄 开始转换</button></div>';
  const main = '<div class="card anim" style="display:flex;align-items:center;justify-content:center;min-height:350px;height:100%">' +
    (s.res ? '<div style="text-align:center"><div style="font-weight:600;margin-bottom:10px">转换完成 · ' + (s.size/1024).toFixed(1) + ' KB</div><img src="' + s.res + '" style="max-width:100%;max-height:60vh;border-radius:16px;margin-bottom:14px"><button onclick="dl(S.conv.blob,\'xiuxiutu.' + FMT[s.fmt].ext + '\')" class="btn btn-outline">⬇ 下载</button></div>'
    : '<div style="text-align:center;color:#aaa"><div style="font-size:48px;margin-bottom:12px">🔄</div><div style="font-weight:600">上传图片，选择格式，一键转换</div></div>') + '</div>';
  if (isM) return '<div style="display:flex;flex-direction:column;gap:16px;">' + bar + main + '</div>';
  return '<div style="display:flex;gap:16px;height:100%"><div class="card" style="width:320px;flex-shrink:0">' + bar + '</div><div style="flex:1">' + main + '</div></div>';
}

function renderResize() {
  const s = S.resize; const isM = m();
  const bar = '<div style="display:flex;flex-direction:column;gap:16px"><div style="font-size:20px;font-weight:700">📐 尺寸调整</div>' +
    (!s.src ? '<div class="upload-zone" onclick="document.getElementById(\'f3\').click()"><div style="font-size:42px">📐</div><div style="font-weight:600;margin-top:8px">点击上传图片</div></div>'
    : '<div style="border-radius:18px;overflow:hidden"><img src="' + s.src + '" style="width:100%"></div><button onclick="S.resize.src=null;S.resize.res=null;render()" style="font-size:12px;color:#6b6b6b;text-decoration:underline;align-self:flex-start">重选</button>') +
    '<input id="f3" type="file" accept="image/*" hidden/>' +
    '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span style="font-size:12px;color:#6b6b6b">宽</span><input type="number" value="' + iw + '" oninput="iw=this.value" style="width:70px;padding:8px;border-radius:12px;border:1.5px solid #e8e5e0;font-size:14px;font-weight:700;text-align:center"><span>×</span><span style="font-size:12px;color:#6b6b6b">高</span><input type="number" value="' + ih + '" oninput="ih=this.value" style="width:70px;padding:8px;border-radius:12px;border:1.5px solid #e8e5e0;font-size:14px;font-weight:700;text-align:center"><span style="font-size:10px;color:#aaa">当前' + s.w + '×' + s.h + '</span></div>' +
    '<div style="display:flex;gap:6px"><button onclick="S.resize.mode=\'fit\';render()" style="flex:1;padding:10px;border-radius:16px;font-weight:700;border:2px solid ' + (s.mode === 'fit' ? '#c8a96e' : '#e8e5e0') + ';background:' + (s.mode === 'fit' ? '#f5efe4' : '#fff') + '">📐 等比例</button><button onclick="S.resize.mode=\'fill\';render()" style="flex:1;padding:10px;border-radius:16px;font-weight:700;border:2px solid ' + (s.mode === 'fill' ? '#c8a96e' : '#e8e5e0') + ';background:' + (s.mode === 'fill' ? '#f5efe4' : '#fff') + '">📏 拉伸</button></div>' +
    '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span style="font-size:12px;color:#6b6b6b">格式</span><select onchange="S.resize.fmt=this.selectedIndex;render()" style="padding:8px;border-radius:12px;border:1px solid #e8e5e0">' + FMT.map(f => '<option>' + f.ext.toUpperCase() + '</option>').join('') + '</select><span style="font-size:12px;color:#6b6b6b">质量</span><input type="range" min="10" max="100" value="' + s.q + '" oninput="S.resize.q=parseInt(this.value);render()"><span style="font-weight:700">' + s.q + '%</span></div>' +
    '<button onclick="resizeProcess()" class="btn btn-primary"' + (!s.src ? ' disabled style="opacity:.4"' : '') + '>📐 开始调整</button></div>';
  const main = '<div class="card anim" style="display:flex;align-items:center;justify-content:center;min-height:350px;height:100%">' +
    (s.res ? '<div style="text-align:center"><div style="font-weight:600;margin-bottom:10px">' + s.w + '×' + s.h + 'px · ' + (s.size/1024).toFixed(1) + ' KB</div><img src="' + s.res + '" style="max-width:100%;max-height:60vh;border-radius:16px;margin-bottom:14px"><button onclick="dl(S.resize.blob,\'xiuxiutu_resize.' + FMT[s.fmt].ext + '\')" class="btn btn-outline">⬇ 下载</button></div>'
    : '<div style="text-align:center;color:#aaa"><div style="font-size:48px;margin-bottom:12px">📐</div><div style="font-weight:600">上传图片，设置尺寸，一键调整</div></div>') + '</div>';
  if (isM) return '<div style="display:flex;flex-direction:column;gap:16px;">' + bar + main + '</div>';
  return '<div style="display:flex;gap:16px;height:100%"><div class="card" style="width:320px;flex-shrink:0">' + bar + '</div><div style="flex:1">' + main + '</div></div>';
}

async function privacyLoad(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = function(e) { S.privacy.src = e.target.result; S.privacy.file = file; S.privacy.phase = 1; S.privacy.exif = null; S.privacy.cleanedBlob = null; render(); };
  reader.readAsDataURL(file);
}

async function privacyScan() {
  if (!S.privacy.file) return;
  S.privacy.phase = 2; render();
  const exif = await readExif(S.privacy.file);
  S.privacy.exif = exif; render();
}

async function privacyClean() {
  if (!S.privacy.file) return;
  S.privacy.phase = 3; render();
  try {
    const cleaned = await clearExif(S.privacy.file);
    S.privacy.cleanedBlob = cleaned;
  } catch(e) { alert('清除失败，请重试'); S.privacy.phase = 2; }
  render();
}

async function convProcess() {
  const r = await convert(S.conv.src, FMT[S.conv.fmt].id, S.conv.q);
  S.conv.res = r.url; S.conv.size = r.size; S.conv.blob = r.blob; render();
}

async function resizeProcess() {
  const w = parseInt(iw), h = parseInt(ih);
  if (!isNaN(w) && w > 0 && !isNaN(h) && h > 0) { S.resize.w = Math.round(w); S.resize.h = Math.round(h); }
  const r = await resizeImg(S.resize.src, S.resize.w, S.resize.h, FMT[S.resize.fmt].id, S.resize.q, S.resize.mode);
  S.resize.res = r.url; S.resize.size = r.size; S.resize.blob = r.blob; S.resize.w = r.w; S.resize.h = r.h; render();
}

render();
window.addEventListener('resize', render);
</script>
</body>
</html>
