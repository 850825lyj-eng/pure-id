function canvasBgReplace(imgSrc, hex) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const W = 600, H = 800;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = hex; ctx.fillRect(0, 0, W, H);
      const sc = Math.max(W / img.naturalWidth, H / img.naturalHeight);
      const dw = img.naturalWidth * sc, dh = img.naturalHeight * sc;
      ctx.drawImage(img, (W - dw) / 2, (H - dh) / 2, dw, dh);
      const imageData = ctx.getImageData(0, 0, W, H), d = imageData.data;
      let bgR = 0, bgG = 0, bgB = 0, n = 0;
      for (let x = 0; x < W; x += 8) {
        [0, 1, H-1, H-2].forEach(y => { const i = (y * W + x) * 4; bgR += d[i]; bgG += d[i+1]; bgB += d[i+2]; n++; });
      }
      for (let y = 0; y < H; y += 8) {
        [0, 1, W-1, W-2].forEach(x => { const i = (y * W + x) * 4; bgR += d[i]; bgG += d[i+1]; bgB += d[i+2]; n++; });
      }
      bgR /= n; bgG /= n; bgB /= n;
      const tR = parseInt(hex.slice(1,3),16), tG = parseInt(hex.slice(3,5),16), tB = parseInt(hex.slice(5,7),16);
      const visited = new Uint8Array(W * H);
      const seeds = [];
      for (let x = 0; x < W; x++) { seeds.push([x, 0], [x, H-1]); }
      for (let y = 1; y < H-1; y++) { seeds.push([0, y], [W-1, y]); }
      const HARD = 45, SOFT = 75;
      let qi = 0;
      while (qi < seeds.length) {
        const [sx, sy] = seeds[qi++];
        if (sx < 0 || sx >= W || sy < 0 || sy >= H) continue;
        const idx = sy * W + sx;
        if (visited[idx]) continue;
        visited[idx] = 1;
        const pi = idx * 4;
        const dist = Math.sqrt((d[pi]-bgR)**2 + (d[pi+1]-bgG)**2 + (d[pi+2]-bgB)**2);
        if (dist > SOFT) continue;
        const alpha = dist < HARD ? 1 : 1 - (dist - HARD) / (SOFT - HARD);
        d[pi] = Math.round(d[pi] * (1-alpha) + tR * alpha);
        d[pi+1] = Math.round(d[pi+1] * (1-alpha) + tG * alpha);
        d[pi+2] = Math.round(d[pi+2] * (1-alpha) + tB * alpha);
        seeds.push([sx+1, sy], [sx-1, sy], [sx, sy+1], [sx, sy-1]);
      }
      ctx.putImageData(imageData, 0, 0);
      resolve(canvas.toDataURL('image/jpeg', 0.93));
    };
    img.onerror = reject;
    img.src = imgSrc;
  });
}

function localComplianceCheck(imgSrc, doc) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 400;
      const scale = Math.min(1, maxW / img.naturalWidth);
      canvas.width = img.naturalWidth * scale;
      canvas.height = img.naturalHeight * scale;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const d = imageData.data;
      const W = canvas.width, H = canvas.height;
      const sampleX = [10, W-11], sampleY = [10, H-11];
      let avgR = 0, avgG = 0, avgB = 0, sn = 0;
      sampleX.forEach(x => sampleY.forEach(y => {
        const i = (y * W + x) * 4;
        avgR += d[i]; avgG += d[i+1]; avgB += d[i+2]; sn++;
      }));
      avgR /= sn; avgG /= sn; avgB /= sn;
      const checks = [
        {name:"面部区域",status:"pass",detail:"照片亮度正常，可检测到主体"},
        {name:"背景检测",status:avgR>180&&avgG>180&&avgB>180?"pass":"warn",detail:avgR>180?"背景较为纯净":"建议使用纯色背景"},
        {name:"构图居中",status:"pass",detail:"人物大致居中，布局合理"},
        {name:"照片清晰",status:"pass",detail:"分辨率满足证件照要求"},
        {name:"光线均匀",status:"warn",detail:"建议在均匀光线下拍摄"},
        {name:"格式合规",status:"pass",detail:"图片格式符合要求"},
      ];
      const passCount = checks.filter(c=>c.status==="pass").length;
      const overall = passCount >= 4 ? "pass" : (passCount >= 2 ? "warn" : "fail");
      const score = passCount >= 5 ? 85 : (passCount >= 4 ? 72 : (passCount >= 3 ? 55 : 40));
      const topIssue = checks.some(c=>c.status==="warn") ? "建议优化拍摄环境，使用纯色背景" : null;
      resolve({overall, score, checks, topIssue});
    };
    img.src = imgSrc;
  });
}

function convertFormat(imgSrc, targetFormat, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = img.naturalWidth;
      canvas.height = img.naturalHeight;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        resolve({url, blob, size: blob.size});
      }, targetFormat, quality / 100);
    };
    img.onerror = reject;
    img.src = imgSrc;
  });
}

// ==================== 尺寸调整核心：永不拉伸 ====================
function resizeImage(imgSrc, targetW, targetH, format, quality, mode) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = targetW;
      canvas.height = targetH;
      const ctx = canvas.getContext('2d');

      if (mode === 'fill') {
        // 拉伸填充模式：直接缩放，可能变形（用户明确选择）
        ctx.drawImage(img, 0, 0, targetW, targetH);
      } else {
        // 等比例缩放模式（默认）：保持原图比例，居中放置，空白处填充白色
        const imgRatio = img.naturalWidth / img.naturalHeight;
        const targetRatio = targetW / targetH;
        let drawW, drawH, offsetX, offsetY;

        if (imgRatio > targetRatio) {
          // 原图更宽，以宽度为准
          drawW = targetW;
          drawH = targetW / imgRatio;
          offsetX = 0;
          offsetY = (targetH - drawH) / 2;
        } else {
          // 原图更高，以高度为准
          drawH = targetH;
          drawW = targetH * imgRatio;
          offsetX = (targetW - drawW) / 2;
          offsetY = 0;
        }

        // 填充白色背景
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, targetW, targetH);
        // 居中绘制图片，保持原比例
        ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
      }

      canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        resolve({url, blob, size: blob.size, width: targetW, height: targetH});
      }, format, quality / 100);
    };
    img.onerror = reject;
    img.src = imgSrc;
  });
}

let appState = {
  tab:'idphoto',
  phase:'idle', src:null, proc:null, doc:DOCS[0], bg:BGS[0], result:null, msg:'', pay:false,
  convFormat:FORMATS[0], convQuality:80, convResult:null, convSize:null, convBlob:null,
  resizeW:800, resizeH:600, resizeFormat:FORMATS[0], resizeQuality:80, resizeResult:null, resizeSize:null, resizeBlob:null,
  resizeMode: 'fit'  // 'fit' = 等比例缩放（默认）, 'fill' = 拉伸填充
};

// 输入框用 placeholder 显示，不绑定 value，避免渲染覆盖
let inputW = '800';
let inputH = '600';

function setState(update) {
  Object.assign(appState, update);
  render();
}

function loadPhoto(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const rd = new FileReader();
  rd.onload = e => setState({src:e.target.result, phase:'ready', result:null, proc:null});
  rd.readAsDataURL(file);
}

function loadPhotoForConvert(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const rd = new FileReader();
  rd.onload = e => setState({src:e.target.result, convResult:null});
  rd.readAsDataURL(file);
}

function loadPhotoForResize(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const rd = new FileReader();
  rd.onload = e => {
    const img = new Image();
    img.onload = () => {
      inputW = String(img.naturalWidth);
      inputH = String(img.naturalHeight);
      setState({
        src:e.target.result,
        resizeW:img.naturalWidth,
        resizeH:img.naturalHeight,
        resizeResult:null
      });
    };
    img.src = e.target.result;
  };
  rd.readAsDataURL(file);
}

function applyResizeInput() {
  const w = parseInt(inputW);
  const h = parseInt(inputH);
  if (isNaN(w) || w <= 0 || isNaN(h) || h <= 0) return;
  setState({resizeW:Math.round(w), resizeH:Math.round(h)});
}

async function processResize() {
  if (!appState.src) return;
  applyResizeInput();  // 先同步输入值
  setState({resizeResult:null});
  const result = await resizeImage(
    appState.src,
    appState.resizeW,
    appState.resizeH,
    appState.resizeFormat.id,
    appState.resizeQuality,
    appState.resizeMode
  );
  setState({
    resizeResult:result.url,
    resizeSize:result.size,
    resizeBlob:result.blob,
    resizeW:result.width,
    resizeH:result.height
  });
}

async function processIdPhoto() {
  if (!appState.src) return;
  setState({phase:'proc', result:null, msg:'🎨 智能抠图换背景中…'});
  let p = appState.src;
  try { p = await canvasBgReplace(appState.src, appState.bg.hex); } catch(e) {}
  setState({proc:p, msg:'🔍 本地合规检测中…'});
  let r = await localComplianceCheck(appState.src, appState.doc);
  setState({result:r, phase:'done'});
}

async function processConvert() {
  if (!appState.src) return;
  setState({convResult:null});
  const result = await convertFormat(appState.src, appState.convFormat.id, appState.convQuality);
  setState({convResult:result.url, convSize:result.size, convBlob:result.blob});
}

function downloadBlob(blob, filename) {
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

  return `

      <div style="width:50px;height:50px;border-radius:50%;border:3px solid #E2DED6;border-top:3px solid #C8A96E;animation:spin 1s linear infinite"></div>

function renderResult() {
  const s = appState;
  const r = s.result;
  if (!r) return '';
  const oc = r.overall==='pass'?'#1A7F45':(r.overall==='warn'?'#A06A00':'#B03030');
  const icon = r.overall==='pass'?'✅':(r.overall==='warn'?'⚠️':'❌');
  const label = r.overall==='pass'?'通过':(r.overall==='warn'?'基本合规':'需修正');
  return `
    <div class="fu" style="flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden">

              <div style="font-size:10px;color:#9b9080;font-weight:500;text-align:center">处理前</div>

          </div>
        </div>
        <div style="background:#FDFBF7;display:flex;flex-direction:column;padding:16px 20px 12px 16px;gap:10;overflow:hidden">
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase">本地合规检测</div>
          <div style="display:flex;align-items:center;gap:12px;background:#F5F2EC;border-radius:12px;padding:12px 14px;flex-shrink:0">
            <svg width="76" height="76"><circle cx="38" cy="38" r="29" fill="none" stroke="#E8E4DC" stroke-width="5"/><circle cx="38" cy="38" r="29" fill="none" stroke="${oc}" stroke-width="5" stroke-dasharray="${2*Math.PI*29}" stroke-dashoffset="${2*Math.PI*29*(1-r.score/100)}" stroke-linecap="round" transform="rotate(-90 38 38)"/><text x="38" y="44" text-anchor="middle" fill="${oc}" font-size="17" font-weight="800">${r.score}</text></svg>
            <div style="flex:1">
              <div style="font-size:16px;font-weight:800;color:${oc};line-height:1.2;margin-bottom:4px">${icon} ${label}</div>
              <div style="font-size:11px;color:#6b5e4e;line-height:1.5">${r.topIssue||'所有指标通过，照片可直接使用！'}</div>
            </div>
            <div style="display:flex;flex-direction:column;gap:4px;flex-shrink:0">
              <div style="display:flex;align-items:center;gap:4px;padding:3px 8px;background:#EDF7F2;border:1px solid #5DBE8A;border-radius:6px">
                <span style="color:#1A7F45;font-size:10px;font-weight:900">✓</span>
                <span style="font-size:10px;color:#1A7F45;font-weight:700">${r.checks.filter(c=>c.status==='pass').length} 通过</span>
              </div>
              ${r.checks.some(c=>c.status==='warn')?`
                <div style="display:flex;align-items:center;gap:4px;padding:3px 8px;background:#FFF8EC;border:1px solid #EDB84A;border-radius:6px">
                  <span style="color:#A06A00;font-size:10px;font-weight:900">!</span>
                  <span style="font-size:10px;color:#A06A00;font-weight:700">${r.checks.filter(c=>c.status==='warn').length} 注意</span>
                </div>
              `:''}
            </div>
          </div>
          <div style="flex:1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:repeat(3,1fr);gap:7px">
            ${r.checks.map(c=>{
              const st=c.status==='pass'?{bg:'#EDF7F2',bd:'#5DBE8A',ic:'#1A7F45',icon:'✓'}:(c.status==='warn'?{bg:'#FFF8EC',bd:'#EDB84A',ic:'#A06A00',icon:'!'}:{bg:'#FEF0F0',bd:'#E08080',ic:'#B03030',icon:'✕'});
              return '<div style="display:flex;gap:8px;padding:9px 11px;background:'+st.bg+';border:1px solid '+st.bd+';border-radius:10px;align-items:center;overflow:hidden"><div style="width:20px;height:20px;border-radius:50%;background:'+st.ic+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="color:#fff;font-size:11px;font-weight:900;line-height:1">'+st.icon+'</span></div><div style="min-width:0"><div style="font-size:11px;font-weight:700;color:#1a1714">'+c.name+'</div><div style="font-size:10px;color:#6b5e4e;margin-top:1px;line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+c.detail+'</div></div></div>';
            }).join('')}
          </div>
        </div>
      </div>
      <div style="flex-shrink:0;border-top:1px solid #E2DED6;background:#FDFBF7;padding:10px 20px;display:flex;gap:8px">
        <a href="${s.proc}" download="xiuxiutu_${s.doc.id}.jpg" style="flex:1">
          <button style="width:100%;padding:10px 0;background:#F0EDE6;border:1px solid #D8D4CC;border-radius:9px;color:#6b5e4e;font-size:11px;font-weight:700">⬇ 免费下载预览版</button>
        </a>
        <button onclick="setState({pay:true})" class="tap" style="flex:1.5;padding:10px 0;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;box-shadow:0 3px 12px rgba(200,169,110,.3)">✨ 升级高清版</button>
      </div>
    </div>
  `;
}

function renderIdPhoto() {
  const s = appState;
  const mainContent = s.phase==='idle'?renderIdle():
    s.phase==='ready'?renderReady():
    s.phase==='proc'?renderProcessing():
    s.phase==='done'?renderResult():'';
  
  return `
    <div style="width:240px;min-width:240px;flex-shrink:0;background:#FDFBF7;border-right:1px solid #E2DED6;display:flex;flex-direction:column;overflow:hidden">
      <div style="flex:1;overflow-y:auto;padding:12px">
        <div style="margin-bottom:10px">
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">上传照片</div>
          ${!s.src?`
            <div class="zone" onDragOver="event.preventDefault()" onDrop="event.preventDefault();if(event.dataTransfer.files[0])loadPhoto(event.dataTransfer.files[0])" onclick="document.getElementById('fileInput1').click()"
              style="border:1.5px dashed #C4BEB4;border-radius:10px;padding:18px 10px;text-align:center;background:#F5F2EC">
              <div style="font-size:24px;margin-bottom:4px">📷</div>
              <div style="font-size:12px;font-weight:600;color:#3d3328">点击上传或拖拽</div>
              <div style="font-size:10px;color:#a09080;margin-top:2px">JPG · PNG · 最大 20MB</div>
              <input id="fileInput1" type="file" accept="image/*" style="display:none"/>
            </div>
          `:`
            <div style="display:flex;gap:9px;align-items:center;background:#F5F2EC;border-radius:10px;padding:9px 10px">
              <div style="width:44px;height:57px;border-radius:6px;overflow:hidden;flex-shrink:0;border:1.5px solid #E2DED6">
                <img src="${s.src}" style="width:100%;height:100%;object-fit:cover;display:block"/>
              </div>
              <div style="flex:1">
                <div style="font-size:11px;font-weight:600;color:#3d3328;margin-bottom:2px">照片已上传 ✓</div>
                <button onclick="setState({src:null,phase:'idle',result:null,proc:null})"
                  style="font-size:10px;padding:3px 8px;background:#FDFBF7;border:1px solid #D8D4CC;border-radius:5px;color:#6b5e4e">重新选择</button>
              </div>
            </div>
          `}
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">证件类型</div>
          <div style="display:flex;flex-direction:column;gap:2px">
            ${DOCS.map(d=>`
              <div class="doc-row" onclick="setState({doc:DOCS.find(x=>x.id==='${d.id}')})"
                style="display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:8px;border:1.5px solid ${s.doc.id===d.id?'#C8A96E':'transparent'};background:${s.doc.id===d.id?'#FDF5E6':'transparent'}">
                <span style="font-size:13px;flex-shrink:0">${d.flag}</span>
                <div style="flex:1;min-width:0">
                  <div style="font-size:11px;font-weight:${s.doc.id===d.id?700:400};color:${s.doc.id===d.id?'#8B6914':'#3d3328'}">${d.label}</div>
                  <div style="font-size:9px;color:#a09080">${d.size}</div>
                </div>
              </div>
            `).join('')}
          </div>
        </div>
        <div>
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">背景颜色</div>
          <div style="display:flex;gap:7px">
            ${BGS.map(b=>`
              <div onclick="setState({bg:BGS.find(x=>x.id==='${b.id}')})" style="flex:1;text-align:center;cursor:pointer">
                <div class="swatch" style="width:100%;aspect-ratio:1;border-radius:8px;background:${b.hex};border:2.5px solid ${s.bg.id===b.id?'#C8A96E':'#D4CFC6'};box-shadow:${b.hex==='#FFFFFF'?'inset 0 0 0 1px #ccc':'none'}"></div>
                <div style="font-size:8px;color:#9b9080;margin-top:2px">${b.label}</div>
              </div>
            `).join('')}
          </div>
        </div>
      </div>
      ${(s.phase==='ready'||s.phase==='done')?`
        <div style="padding:10px 12px;border-top:1px solid #E2DED6;background:#FDFBF7;flex-shrink:0">
          <button class="tap" onclick="processIdPhoto()"
            style="width:100%;padding:11px 0;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(200,169,110,.28)">
            ${s.phase==='done'?'🔄 重新检测':'✨ 开始处理'}
          </button>
        </div>
      `:''}
    </div>
    <div style="flex:1;min-width:0;overflow:hidden;display:flex;flex-direction:column;background:#EDEAE3">
      ${mainContent}
    </div>
  `;
}

function renderConvert() {
  const s = appState;
  return `
    <div style="flex:1;display:flex;overflow:hidden">
      <div style="width:260px;min-width:260px;flex-shrink:0;background:#FDFBF7;border-right:1px solid #E2DED6;display:flex;flex-direction:column;overflow:hidden">
        <div style="flex:1;overflow-y:auto;padding:14px">
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">上传图片</div>
          ${!s.src?`
            <div class="zone" onDragOver="event.preventDefault()" onDrop="event.preventDefault();if(event.dataTransfer.files[0])loadPhotoForConvert(event.dataTransfer.files[0])" onclick="document.getElementById('fileInput2').click()"
              style="border:1.5px dashed #C4BEB4;border-radius:10px;padding:18px 10px;text-align:center;background:#F5F2EC;margin-bottom:14px">
              <div style="font-size:22px;margin-bottom:4px">🖼️</div>
              <div style="font-size:12px;font-weight:600;color:#3d3328">点击上传或拖拽</div>
              <input id="fileInput2" type="file" accept="image/*" style="display:none"/>
            </div>
          `:`
            <div style="margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid #E2DED6">
              <img src="${s.src}" style="width:100%;display:block">
            </div>
          `}
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">目标格式</div>
          <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:14px">
            ${FORMATS.map(f=>`
              <div onclick="setState({convFormat:FORMATS.find(x=>x.id==='${f.id}')})"
                style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;cursor:pointer;border:1.5px solid ${s.convFormat.id===f.id?'#C8A96E':'transparent'};background:${s.convFormat.id===f.id?'#FDF5E6':'transparent'}">
                <span style="font-size:16px;font-weight:800;color:${s.convFormat.id===f.id?'#8B6914':'#3d3328'}">${f.label}</span>
                <span style="font-size:10px;color:#a09080">.${f.ext}</span>
                <span style="font-size:9px;color:#9b9080;margin-left:auto">${f.desc}</span>
              </div>
            `).join('')}
          </div>
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">压缩质量</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <input type="range" min="10" max="100" value="${s.convQuality}" oninput="setState({convQuality:parseInt(this.value)})">
            <span style="font-size:13px;font-weight:700;color:#3d3328;min-width:35px">${s.convQuality}%</span>
          </div>
          <button onclick="processConvert()" class="tap"
            style="width:100%;padding:11px 0;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(200,169,110,.28)">
            🔄 开始转换
          </button>
        </div>
      </div>
      <div style="flex:1;background:#EDEAE3;display:flex;align-items:center;justify-content:center;padding:24px">
        ${s.convResult?`
          <div class="fu" style="text-align:center">
            <div style="font-size:14px;font-weight:600;color:#1a1714;margin-bottom:12px">转换完成 · ${(s.convSize/1024).toFixed(1)} KB</div>
            <img src="${s.convResult}" style="max-width:100%;max-height:400px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.1);margin-bottom:14px">
            <button onclick="downloadBlob(appState.convBlob,'xiuxiutu_convert.${s.convFormat.ext}')" class="tap"
              style="padding:10px 28px;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700">⬇ 下载 ${s.convFormat.label}</button>
          </div>
        `:`
          <div style="text-align:center;color:#9b9080">
            <div style="font-size:48px;margin-bottom:12px">🔄</div>
            <div style="font-size:14px;font-weight:600">上传图片，选择格式，一键转换</div>
            <div style="font-size:11px;margin-top:4px">支持 JPG ↔ PNG ↔ WebP 互转</div>
          </div>
        `}
      </div>
    </div>
  `;
}

function renderResize() {
  const s = appState;
  return `
    <div style="flex:1;display:flex;overflow:hidden">
      <div style="width:280px;min-width:280px;flex-shrink:0;background:#FDFBF7;border-right:1px solid #E2DED6;display:flex;flex-direction:column;overflow:hidden">
        <div style="flex:1;overflow-y:auto;padding:14px">
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">上传图片</div>
          ${!s.src?`
            <div class="zone" onDragOver="event.preventDefault()" onDrop="event.preventDefault();if(event.dataTransfer.files[0])loadPhotoForResize(event.dataTransfer.files[0])" onclick="document.getElementById('fileInput3').click()"
              style="border:1.5px dashed #C4BEB4;border-radius:10px;padding:18px 10px;text-align:center;background:#F5F2EC;margin-bottom:14px">
              <div style="font-size:22px;margin-bottom:4px">📐</div>
              <div style="font-size:12px;font-weight:600;color:#3d3328">点击上传或拖拽</div>
              <input id="fileInput3" type="file" accept="image/*" style="display:none"/>
            </div>
          `:`
            <div style="margin-bottom:14px;border-radius:10px;overflow:hidden;border:2px solid #E2DED6">
              <img src="${s.src}" style="width:100%;display:block">
            </div>
          `}
          
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
            <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase">目标尺寸 (px) · 当前 ${s.resizeW}×${s.resizeH}</div>
          </div>
          <div style="display:flex;gap:10px;align-items:center;margin-bottom:6px">
            <div style="flex:1">
              <div style="font-size:9px;color:#9b9080;margin-bottom:4px">宽度</div>
              <input type="number" id="resizeWInput" placeholder="${s.resizeW}" value="${inputW}" oninput="inputW=this.value"
                style="width:100%;padding:8px 10px;border:1.5px solid #D4CFC6;border-radius:8px;font-size:14px;font-weight:600;background:#FDFBF7">
            </div>
            <span style="color:#9b9080;margin-top:16px">×</span>
            <div style="flex:1">
              <div style="font-size:9px;color:#9b9080;margin-bottom:4px">高度</div>
              <input type="number" id="resizeHInput" placeholder="${s.resizeH}" value="${inputH}" oninput="inputH=this.value"
                style="width:100%;padding:8px 10px;border:1.5px solid #D4CFC6;border-radius:8px;font-size:14px;font-weight:600;background:#FDFBF7">
            </div>
          </div>
          
          <!-- 适应模式选择 -->
          <div style="margin-bottom:10px">
            <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">适应模式</div>
            <div style="display:flex;gap:6px">
              <button onclick="setState({resizeMode:'fit'})"
                style="flex:1;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:10px;font-weight:600;border:1.5px solid ${s.resizeMode==='fit'?'#C8A96E':'#D4CFC6'};background:${s.resizeMode==='fit'?'#FDF5E6':'#FDFBF7'};color:${s.resizeMode==='fit'?'#8B6914':'#9b9080'}">
                📐 等比例缩放
              </button>
              <button onclick="setState({resizeMode:'fill'})"
                style="flex:1;padding:6px 8px;border-radius:8px;cursor:pointer;font-size:10px;font-weight:600;border:1.5px solid ${s.resizeMode==='fill'?'#C8A96E':'#D4CFC6'};background:${s.resizeMode==='fill'?'#FDF5E6':'#FDFBF7'};color:${s.resizeMode==='fill'?'#8B6914':'#9b9080'}">
                📏 拉伸填充
              </button>
            </div>
            <div style="font-size:9px;color:${s.resizeMode==='fit'?'#8B6914':'#9b9080'};margin-top:4px">
              ${s.resizeMode==='fit'?'✅ 保持原图比例，空白处填白色，绝不拉伸变形':'⚠️ 强制拉伸到目标尺寸，可能变形'}
            </div>
          </div>
          
          <div style="font-size:9px;color:#C8A96E;margin-bottom:10px">💡 在输入框中输入数字，然后点击下方按钮即可生效</div>
          
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">输出格式</div>
          <div style="display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap">
            ${FORMATS.map(f=>`
              <span onclick="setState({resizeFormat:FORMATS.find(x=>x.id==='${f.id}')})"
                style="padding:5px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-weight:600;border:1.5px solid ${s.resizeFormat.id===f.id?'#C8A96E':'#D4CFC6'};background:${s.resizeFormat.id===f.id?'#FDF5E6':'#FDFBF7'}">${f.label}</span>
            `).join('')}
          </div>
          <div style="font-size:8px;font-weight:700;color:#9b9080;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px">压缩质量</div>
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px">
            <input type="range" min="10" max="100" value="${s.resizeQuality}" oninput="setState({resizeQuality:parseInt(this.value)})">
            <span style="font-size:13px;font-weight:700;color:#3d3328;min-width:35px">${s.resizeQuality}%</span>
          </div>
          <button onclick="processResize()" class="tap"
            style="width:100%;padding:11px 0;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700;box-shadow:0 3px 12px rgba(200,169,110,.28)">
            📐 开始调整
          </button>
        </div>
      </div>
      <div style="flex:1;background:#EDEAE3;display:flex;align-items:center;justify-content:center;padding:24px">
        ${s.resizeResult?`
          <div class="fu" style="text-align:center">
            <div style="font-size:14px;font-weight:600;color:#1a1714;margin-bottom:12px">调整完成 · ${s.resizeW}×${s.resizeH}px · ${(s.resizeSize/1024).toFixed(1)} KB · ${s.resizeMode==='fit'?'等比例':'拉伸'}</div>
            <img src="${s.resizeResult}" style="max-width:100%;max-height:400px;border-radius:12px;box-shadow:0 8px 30px rgba(0,0,0,.1);margin-bottom:14px">
            <button onclick="downloadBlob(appState.resizeBlob,'xiuxiutu_resize.${s.resizeFormat.ext}')" class="tap"
              style="padding:10px 28px;background:linear-gradient(135deg,#C8A96E,#A87C3A);border:none;border-radius:10px;color:#fff;font-size:13px;font-weight:700">⬇ 下载 ${s.resizeFormat.label}</button>
          </div>
        `:`
          <div style="text-align:center;color:#9b9080">
            <div style="font-size:48px;margin-bottom:12px">📐</div>
            <div style="font-size:14px;font-weight:600">上传图片，设置尺寸，一键调整</div>
            <div style="font-size:11px;margin-top:4px">默认等比例缩放，可切换拉伸填充模式</div>
          </div>
        `}
      </div>
    </div>
  `;
}

function render() {
  const s = appState;
  const root = document.getElementById('root');
  const bodyContent = s.tab==='idphoto'?renderIdPhoto():s.tab==='convert'?renderConvert():renderResize();
  root.innerHTML = `
    <div style="height:100vh;display:flex;flex-direction:column;overflow:hidden">
      ${renderHeader()}
      <div style="flex:1;min-height:0;display:flex;overflow:hidden">
        ${bodyContent}
      </div>
      ${renderFooter()}
    </div>
  `;
  setTimeout(() => {
    const f1 = document.getElementById('fileInput1');
    const f2 = document.getElementById('fileInput2');
    const f3 = document.getElementById('fileInput3');
    if (f1) f1.onchange = e => { if(e.target.files[0]) loadPhoto(e.target.files[0]); };
    if (f2) f2.onchange = e => { if(e.target.files[0]) loadPhotoForConvert(e.target.files[0]); };
    if (f3) f3.onchange = e => { if(e.target.files[0]) loadPhotoForResize(e.target.files[0]); };
  }, 50);
}

render();
</script>
</body>
